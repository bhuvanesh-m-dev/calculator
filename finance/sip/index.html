<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="calculator-container">
        <div class="header">
            <h2>SIP Calculator</h2>
            <button id="themeToggle" class="icon-btn" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        </div>

        <div class="input-group">
            <label for="monthlyInvestment">Monthly Investment (₹)</label>
            <input type="number" id="monthlyInvestment" min="0" step="100" value="5000">
        </div>

        <div class="input-group">
            <label for="expectedReturn">Expected Return Rate (p.a %)</label>
            <input type="number" id="expectedReturn" min="0" step="0.1" value="12">
        </div>

        <div class="input-group">
            <label for="timePeriod">Time Period (Years)</label>
            <input type="number" id="timePeriod" min="1" step="1" value="10">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="adjustInflation">
            <label for="adjustInflation">Adjust for Inflation</label>
        </div>

        <div class="input-group hidden" id="inflationRateGroup">
            <label for="inflationRate">Expected Inflation Rate (p.a %)</label>
            <input type="number" id="inflationRate" min="0" step="0.1" value="6">
        </div>

        <div class="results">
            <div class="result-row">
                <span>Invested Amount</span>
                <span id="investedAmount">₹0</span>
            </div>
            <div class="result-row">
                <span>Est. Returns</span>
                <span id="estReturns">₹0</span>
            </div>
            <div class="result-row highlight">
                <span>Total Value</span>
                <span id="totalValue">₹0</span>
            </div>
            <div class="result-row highlight hidden" id="adjustedValueGroup">
                <span>Inflation Adjusted Value (Today's Value)</span>
                <span id="adjustedValue">₹0</span>
            </div>
        </div>

        <div class="share-section">
            <p>Share this calculation</p>
            <div class="share-buttons">
                <button id="shareWhatsapp" class="share-btn whatsapp" title="Share on WhatsApp"><i class="fab fa-whatsapp"></i></button>
                <button id="shareTelegram" class="share-btn telegram" title="Share on Telegram"><i class="fab fa-telegram-plane"></i></button>
                <button id="copyLink" class="share-btn copy" title="Copy Link"><i class="fas fa-link"></i></button>
            </div>
        </div>

        <div class="more-tools">
            <a href="https://bhuvanesh-m-dev.github.io/calculator" target="_blank" rel="noopener noreferrer">For more tools visit bhuvanesh-m-dev.github.io/calculator</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
