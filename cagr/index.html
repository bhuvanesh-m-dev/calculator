<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CAGR Calculator | Investment Growth Rate Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #c4b5fd;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .entry-container {
            max-width: 580px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fun-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .fun-header {
            margin-bottom: 32px;
        }

        .fun-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .fun-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .emoji-big {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            background: white;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }

        .funny-msg {
            background: #ede9fe;
            border-radius: 20px;
            padding: 16px;
            margin-top: 24px;
            color: #5b21b6;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .demo-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 20px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 16px;
        }

        @media (max-width: 550px) {
            .fun-card {
                padding: 28px 20px;
            }
            .input-row {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="entry-container">
        <div class="fun-card">
            <div class="fun-header">
                <div class="emoji-big">📈🚀</div>
                <h1>CAGR Calculator</h1>
                <p>Measure your investment's true growth rate</p>
            </div>

            <div class="input-group">
                <label>💰 Initial Investment (₹)</label>
                <input type="number" id="initialValue" placeholder="e.g., 100000" value="100000" step="10000">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>🏆 Final Value (₹)</label>
                    <input type="number" id="finalValue" placeholder="e.g., 300000" value="300000" step="10000">
                </div>
                <div class="input-group">
                    <label>⏰ Time Period (Years)</label>
                    <input type="number" id="periodYears" placeholder="e.g., 5" value="5" step="1">
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">✨ Calculate & Create My CAGR Link ✨</button>
            <button class="generate-btn" id="downloadPdfIndexBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); margin-top: 12px;">📄 Download as PDF</button>

            <div class="funny-msg" id="funnyMsg">
                💜 "CAGR reveals the true magic of compounding!"
            </div>

            <div class="demo-hint">
                💡 Tip: CAGR shows the annualized return of your investment, smoothing out volatility. Generate a shareable link to share your calculation!
            </div>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const downloadPdfIndexBtn = document.getElementById('downloadPdfIndexBtn');
        const initialInput = document.getElementById('initialValue');
        const finalInput = document.getElementById('finalValue');
        const yearsInput = document.getElementById('periodYears');
        const funnyMsgDiv = document.getElementById('funnyMsg');

        const funnyMessages = [
            "💜 CAGR: The only return metric that tells the real story!",
            "📈 Even Warren Buffett loves a good CAGR!",
            "🚀 High CAGR = Wealth creation at warp speed!",
            "💰 Compounding is magic — CAGR reveals the spell!",
            "🏆 Consistency beats volatility — CAGR proves it!",
            "🎯 15%+ CAGR? You're beating the market!",
            "💎 Time in the market > Timing the market — CAGR agrees!",
            "🌟 From ₹1L to ₹1Cr — Let CAGR show you how fast!"
        ];

        function validateInputs() {
            let initial = parseFloat(initialInput.value);
            let final = parseFloat(finalInput.value);
            let years = parseInt(yearsInput.value);

            if (isNaN(initial) || initial < 100) {
                initialInput.value = 10000;
                initial = 10000;
                funnyMsgDiv.innerHTML = "🐣 Starting with ₹10,000? Every investment counts!";
            }
            if (isNaN(final) || final < initial) {
                finalInput.value = initial * 1.5;
                final = initial * 1.5;
                funnyMsgDiv.innerHTML = "📊 Final value should be greater than initial investment!";
            }
            if (isNaN(years) || years < 1) {
                yearsInput.value = 1;
                years = 1;
            }
            if (years > 50) yearsInput.value = 50;
            
            return { initial, final, years };
        }

        function getRandomFunnyMessage() {
            return funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
        }

        function calculateCAGRPreview(initial, final, years) {
            if (initial <= 0 || final <= 0 || years <= 0) return 0;
            let cagr = (Math.pow(final / initial, 1 / years) - 1) * 100;
            return cagr;
        }

        function generateShareableLink() {
            const validated = validateInputs();
            if (!validated) return;
            
            let { initial, final, years } = validated;
            
            // Build URL parameters for calculator page
            const params = new URLSearchParams();
            params.set('initial', initial);
            params.set('final', final);
            params.set('years', years);
            
            // Link to calculator.html (same folder)
            const baseUrl = window.location.href.split('?')[0].replace(/[^/]*$/, '') + 'calculator.html';
            const fullUrl = `${baseUrl}?${params.toString()}`;
            
            // Calculate CAGR for preview
            let cagr = calculateCAGRPreview(initial, final, years);
            
            funnyMsgDiv.innerHTML = `🎉 ${getRandomFunnyMessage()}<br>🔗 CAGR: ${cagr.toFixed(2)}% over ${years} years ✨<br>Opening calculator in new tab...`;
            
            // Open calculator in new tab
            window.open(fullUrl, '_blank');
        }

        generateBtn.addEventListener('click', generateShareableLink);
        
        downloadPdfIndexBtn.addEventListener('click', () => {
            const validated = validateInputs();
            if (!validated) return;
            
            let { initial, final, years } = validated;
            
            const params = new URLSearchParams();
            params.set('initial', initial);
            params.set('final', final);
            params.set('years', years);
            params.set('autoDownload', 'true');
            
            const baseUrl = window.location.href.split('?')[0].replace(/[^/]*$/, '') + 'calculator.html';
            const fullUrl = `${baseUrl}?${params.toString()}`;
            
            funnyMsgDiv.innerHTML = `📄 Opening PDF generator and downloading...`;
            window.open(fullUrl, '_blank');
        });
        
        // Initial random funny message
        funnyMsgDiv.innerHTML = `💜 ${getRandomFunnyMessage()}`;
    </script>
    <img src="https://count.getloli.com/@bhuvanesh-m-dev?name=bhuvanesh-m-dev&theme=ai-1&padding=0&offset=0&align=top&scale=0.1&pixelated=1&darkmode=auto" width="1" height="1" alt="" style="position:absolute;visibility:hidden;" />
</body>
</html>
